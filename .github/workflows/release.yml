name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out slatedb-zig
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Check out SlateDB
        uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: 360de24e9109cd7166708743e5d35aab7f4cb7db
          path: upstream-slatedb

      - name: Install build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig 0.16.0
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) zig_platform="zig-x86_64-linux-0.16.0" ;;
            Linux-aarch64|Linux-arm64) zig_platform="zig-aarch64-linux-0.16.0" ;;
            Darwin-x86_64) zig_platform="zig-x86_64-macos-0.16.0" ;;
            Darwin-arm64) zig_platform="zig-aarch64-macos-0.16.0" ;;
            *)
              echo "unsupported runner: $(uname -s)-$(uname -m)" >&2
              exit 1
              ;;
          esac
          rm -rf "/tmp/${zig_platform}"
          curl -L -o /tmp/zig.tar.xz "https://ziglang.org/download/0.16.0/${zig_platform}.tar.xz"
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/${zig_platform}" >> "${GITHUB_PATH}"

      - name: Generate header
        run: ./scripts/generate-header.sh "${GITHUB_WORKSPACE}/upstream-slatedb"

      - name: Check generated header
        run: git diff --exit-code -- include/slatedb.h

      - name: Run Zig tests
        run: |
          if [[ "$(uname -s)" == "Darwin" ]]; then
            export DYLD_LIBRARY_PATH="${GITHUB_WORKSPACE}/upstream-slatedb/target/debug:${DYLD_LIBRARY_PATH}"
          else
            export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/upstream-slatedb/target/debug:${LD_LIBRARY_PATH}"
          fi
          zig build test -Dupstream_dir="${GITHUB_WORKSPACE}/upstream-slatedb"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out slatedb-zig
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          fi
          echo "value=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag exists
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.value }}"

      - name: Package source archive
        run: |
          mkdir -p dist
          archive="dist/slatedb-zig-${{ steps.tag.outputs.value }}.tar.gz"
          checksum="${archive}.sha256"
          git archive \
            --format=tar.gz \
            --prefix="slatedb-zig-${{ steps.tag.outputs.value }}/" \
            -o "${archive}" \
            "refs/tags/${{ steps.tag.outputs.value }}"
          sha256sum "${archive}" > "${checksum}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
